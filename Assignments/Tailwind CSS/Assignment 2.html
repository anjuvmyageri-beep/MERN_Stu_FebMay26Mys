<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Card</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="bg-white shadow-md rounded-lg p-6 w-full max-w-2xl">

    <!-- Stats Section -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

      <!-- Active Users -->
      <div>
        <p class="text-gray-500 text-sm">Active Users</p>
        <h2 class="text-2xl font-bold">12,480</h2>
        <span class="inline-block mt-2 px-3 py-1 text-sm font-medium bg-green-100 text-green-700 rounded-full">
          Up
        </span>
      </div>

      <!-- Requests -->
      <div>
        <p class="text-gray-500 text-sm">Requests / Min</p>
        <h2 class="text-2xl font-bold">1,240</h2>
        <span class="inline-block mt-2 px-3 py-1 text-sm font-medium bg-blue-100 text-blue-700 rounded-full">
          Stable
        </span>
      </div>

      <!-- Error Rate -->
      <div>
        <p class="text-gray-500 text-sm">Error Rate</p>
        <h2 class="text-2xl font-bold">2.1%</h2>
        <span class="inline-block mt-2 px-3 py-1 text-sm font-medium bg-red-100 text-red-700 rounded-full">
          Down
        </span>
      </div>

    </div>

    <!-- Alert Section -->
    <div class="mt-6 border-l-4 border-red-500 bg-red-50 p-4">
      <p class="text-red-700 text-sm">
        Scheduled maintenance tonight may briefly affect dashboard updates.
      </p>
    </div>

  </div>

</body>
</html>
