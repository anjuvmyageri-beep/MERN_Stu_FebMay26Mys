<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Notification Centers</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex justify-center items-center min-h-screen">

  <div class="bg-white p-6 rounded-lg shadow-md w-96">

    <!-- Header -->
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-lg font-semibold">Notification Center</h2>
      <span class="bg-blue-100 text-blue-600 text-xs px-2 py-1 rounded-full">
        3 New
      </span>
    </div>

    <!-- Action Required -->
    <div class="bg-red-100 border-l-4 border-red-500 text-red-700 p-3 rounded mb-3">
      <p class="font-semibold">Action Required</p>
      <p class="text-sm">
        Your last payment attempt failed. Please update your payment method to avoid service interruption.
      </p>
    </div>

    <!-- Maintenance Notice -->
    <div class="bg-yellow-100 border-l-4 border-yellow-500 text-yellow-700 p-3 rounded mb-4">
      <p class="font-semibold">Maintenance Notice</p>
      <p class="text-sm">
        The system will undergo maintenance tonight. Some features may be temporarily unavailable.
      </p>
    </div>

    <!-- Buttons -->
    <div class="flex gap-3">
      
      <!-- Primary Button -->
      <button class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
        View All
      </button>

      <!-- Secondary Button -->
      <button class="border border-gray-400 text-gray-700 px-4 py-2 rounded hover:bg-gray-100">
        Dismiss
      </button>

    </div>

  </div>

</body>
</html>
