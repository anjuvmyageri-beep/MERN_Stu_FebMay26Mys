<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Validation</title>
</head>

<body>
    <form id="signupForm">

<label>Email:</label>
<input type="email" id="signupEmail">
<br><br>

<label>Password:</label>
<input type="password" id="signupPassword" pattern="[0-9]{10}" placeholder="Enter 10 digit number">
<br><br>

</form>

<p id="message"></p>

<script src="./p5.js"></script>

</body>
</html>
