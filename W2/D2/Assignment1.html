<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notification Center</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="bg-white shadow-lg rounded-xl p-6 w-full max-w-md">
    
    <!-- Header -->
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-lg font-semibold">Notification Center</h2>
      <span class="bg-blue-100 text-blue-600 text-xs font-medium px-2 py-1 rounded-full">
        3 New
      </span>
    </div>

    <!-- Action Required -->
    <div class="border-l-4 border-red-500 bg-red-100 p-4 rounded-md mb-4">
      <h3 class="text-red-700 font-semibold">Action Required</h3>
      <p class="text-red-600 text-sm mt-1">
        Your last payment attempt failed. Please update your payment method to avoid service interruption.
      </p>
    </div>

    <!-- Maintenance Notice -->
    <div class="border-l-4 border-yellow-500 bg-yellow-100 p-4 rounded-md mb-4">
      <h3 class="text-yellow-700 font-semibold">Maintenance Notice</h3>
      <p class="text-yellow-600 text-sm mt-1">
        The system will undergo maintenance tonight. Some features may be temporarily unavailable.
      </p>
    </div>

    <!-- Buttons -->
    <div class="flex gap-3">
      <button class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 transition">
        View All
      </button>
      <button class="border border-gray-400 text-gray-700 px-4 py-2 rounded-md hover:bg-gray-100 transition">
        Dismiss
      </button>
    </div>

  </div>

</body>
</html>
